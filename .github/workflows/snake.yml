name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *" # runs once a day
  workflow_dispatch: {}
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: SumitKasaudhan
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake.gif?color_snake=#8E2DE2&color_dots=#161b22,#4A00E0,#8E2DE2,#a855f7,#c084fc

      - name: Fix dist folder permissions
        run: sudo chmod -R a+rwX dist

      - name: Generate trophy.svg
        env:
          GH_TOKEN: ${{ secrets.TROPHY_TOKEN }}
          GH_USERNAME: SumitKasaudhan
          OUT_DIR: dist
        run: node .github/scripts/generate-trophy.js

      - name: Verify trophy.svg was created
        run: |
          if [ ! -s dist/trophy.svg ]; then
            echo "::error::dist/trophy.svg missing or empty after generation step."
            ls -la dist/ || true
            exit 1
          fi
          echo "trophy.svg OK — size: $(wc -c < dist/trophy.svg) bytes"
          ls -la dist/

      - name: Push generated files to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
